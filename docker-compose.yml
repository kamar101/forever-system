services:
  postgres:
    image: postgres:16-alpine
    container_name: forever-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forever
      POSTGRES_PASSWORD: forever
      POSTGRES_DB: forever
    ports:
      - "5432:5432"
    volumes:
      - forever-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forever -d forever"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  forever-pgdata:
