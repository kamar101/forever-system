# SonarCloud configuration. Free for public repos; uses Automatic Analysis
# (enable it once in the SonarCloud UI — no workflow or token needed). See ADR-0006.
#
# These two MUST match the project you create on sonarcloud.io:
sonar.organization=kamar101
sonar.projectKey=kamar101_forever-system

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts

# Exclude generated, vendored, and test-scaffold paths from analysis.
sonar.exclusions=.next/**,node_modules/**,e2e/**,prisma/migrations/**,**/*.config.ts

# Wired for later: when unit-test coverage is produced (vitest --coverage),
# SonarCloud will pick the lcov report up from here.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
